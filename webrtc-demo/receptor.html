<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Receptor Cámara</title>
</head>
<body>
  <h1>Recibiendo Cámara</h1>
  <video id="remoteVideo" autoplay playsinline></video>

  <script>
    const remoteVideo = document.getElementById("remoteVideo");

    const peer = new Peer("receptor"); // ID único
    peer.on("call", call => {
      call.answer(); // responde la llamada
      call.on("stream", stream => {
        remoteVideo.srcObject = stream;
      });
    });
  </script>

  <!-- PeerJS desde CDN -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</body>
</html>
